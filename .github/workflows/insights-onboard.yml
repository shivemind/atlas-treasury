name: Insights Catalog Onboarding

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  onboard:
    name: Link to API Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean up stale feature branches
        run: |
          for branch in feature/api-catalog-onboarding feature/postman-integration; do
            git push origin --delete "$branch" 2>/dev/null || true
          done

      - uses: postman-cs/postman-insights-onboarding-action@v0
        id: insights
        env:
          INPUT_PROJECT_NAME: atlas-treasury
          INPUT_WORKSPACE_ID: 602f27e3-2272-4ead-8760-9d3dbe5078f9
          INPUT_ENVIRONMENT_ID: 742997bb-d2c1-47e8-b543-dcc97e4b9480
          INPUT_CLUSTER_NAME: atlas-production
          INPUT_GIT_OWNER: shivemind
          INPUT_GIT_REPOSITORY_NAME: atlas-treasury
          INPUT_POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          INPUT_POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          INPUT_POSTMAN_TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_POLL_TIMEOUT_SECONDS: "180"
          INPUT_POLL_INTERVAL_SECONDS: "10"
          INPUT_SYSTEM_ENVIRONMENT_ID: 936898ce-cf73-4feb-827e-8a0e9d5e695e
        with:
          project-name: atlas-treasury
          workspace-id: 602f27e3-2272-4ead-8760-9d3dbe5078f9
          environment-id: 742997bb-d2c1-47e8-b543-dcc97e4b9480
          cluster-name: atlas-production
          git-owner: shivemind
          git-repository-name: atlas-treasury
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-team-id: ${{ secrets.POSTMAN_TEAM_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          poll-timeout-seconds: "180"
          system-environment-id: 936898ce-cf73-4feb-827e-8a0e9d5e695e

      - name: Report
        if: always()
        run: |
          echo "### Insights Onboarding Results" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.insights.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ steps.insights.outputs.discovered-service-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Collection | ${{ steps.insights.outputs.collection-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | ${{ steps.insights.outputs.application-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verification Token | (set) |" >> $GITHUB_STEP_SUMMARY