name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  SPEC_PATH: openapi/openapi.yaml
  API_NAME: "Atlas Treasury API"
  ECR_REPO: "empire/atlas-treasury"
  K8S_DEPLOYMENT: "atlas-treasury"

jobs:
  # ── Gate 1: Validate ──────────────────────────────────────────────
  validate:
    name: "Gate 1: Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: YAML syntax check
        run: npx yaml-lint ${{ env.SPEC_PATH }}

      - name: Spectral OpenAPI lint
        run: npx @stoplight/spectral-cli lint ${{ env.SPEC_PATH }} --ruleset .spectral.yaml --fail-severity error

      - name: Custom schema validation
        run: node scripts/openapi-validate.mjs

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── Gate 2: Postman Sync ──────────────────────────────────────────
  postman-sync:
    name: "Gate 2: Postman Sync"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Sync to Postman API Catalog
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
          PRODUCTION_URL: https://atlas-treasury.vercel.app
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/sync-to-postman.sh
          ./scripts/sync-to-postman.sh "${{ env.SPEC_PATH }}" "${{ env.API_NAME }}"

      - name: API governance lint
        run: |
          npx @stoplight/spectral-cli lint ${{ env.SPEC_PATH }} \
            --ruleset .spectral.yaml \
            --format stylish \
            --fail-severity error

  # ── Gate 3: Smoke Tests ───────────────────────────────────────────
  smoke-tests:
    name: "Gate 3: Smoke Tests"
    needs: postman-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run smoke tests
        run: |
          newman run postman/smoke-tests.json \
            -e postman/environment.json \
            --env-var "baseUrl=${{ secrets.VERCEL_PREVIEW_URL }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --suppress-exit-code 0
        continue-on-error: false

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 30

  # ── Gate 4: Build & Deploy ────────────────────────────────────────
  build-and-deploy:
    name: "Gate 4: Build & Deploy"
    needs: smoke-tests
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: meta
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_REPO:latest .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "tags=$REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Gate 5: Kubernetes Deploy ─────────────────────────────────────
  kubernetes-deploy:
    name: "Gate 5: Kubernetes (EKS)"
    needs: build-and-deploy
    if: ${{ vars.EKS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/ -n atlas-production

      - name: Rolling update
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_DEPLOYMENT }}=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }} \
            -n atlas-production

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n atlas-production -l app=${{ env.K8S_DEPLOYMENT }} -o wide
          echo "Kubernetes deployment updated successfully"

  # ── Gate 6: Post-Deploy Contract Tests ─────────────────────────
  contract-tests:
    name: "Gate 6: Contract Tests"
    needs: build-and-deploy
    if: always() && needs.build-and-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run full API collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: |
          newman run postman/smoke-tests.json \
            -e postman/environment.json \
            --env-var "baseUrl=${{ secrets.VERCEL_PREVIEW_URL }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export contract-test-report.html \
            --timeout-request 15000

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: contract-test-report.html
          retention-days: 30

  # ── Gate 7: Postman Collection Run ──────────────────────────────
  postman-collection-run:
    name: "Gate 7: Postman Collection Run"
    needs: build-and-deploy
    if: always() && needs.build-and-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Resolve Collection UID
        id: resolve
        run: |
          COLL_UID=$(curl -sf "https://api.getpostman.com/collections?workspace=${{ secrets.POSTMAN_WORKSPACE_ID }}" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            | jq -r '.collections[] | select(.name | contains("Treasury API")) | .uid' | head -1)
          echo "collection_uid=$COLL_UID" >> $GITHUB_OUTPUT
          echo "Resolved collection: $COLL_UID"

      - name: Run Collection
        run: |
          postman collection run ${{ steps.resolve.outputs.collection_uid }} \
            -e 52400725-742997bb-d2c1-47e8-b543-dcc97e4b9480 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "### Postman Collection Run - Atlas Treasury API" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: ${{ steps.resolve.outputs.collection_uid }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
