name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-b9618c11-0fa3-4162-9919-c870008008f5 \
            -e 52400725-742997bb-d2c1-47e8-b543-dcc97e4b9480 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Trigger Monitor Run
        run: |
          curl -sf -X POST "https://api.getpostman.com/monitors/52400725-1f11e446-d03e-4fe0-b9d4-5781ce07a4d3/run" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}"

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard - Atlas Treasury" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-b9618c11-0fa3-4162-9919-c870008008f5" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor**: 52400725-1f11e446-d03e-4fe0-b9d4-5781ce07a4d3" >> $GITHUB_STEP_SUMMARY
