name: Publish to Postman Cloud

on:
  push:
    branches: [main]
    paths:
      - 'postman/**'
      - 'openapi/**'
      - '.postman/**'
  workflow_dispatch:

jobs:
  publish:
    name: Sync to Postman Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Push workspace to Postman Cloud
        run: postman workspace push -y

  test:
    name: Run API Tests
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          command: 'collection run 591b044d-f724-4439-8936-0c3efec537c4 -e 95dcc2d7-2489-4a4e-929d-2a6c7678c8c3'
          api-key: ${{ secrets.POSTMAN_API_KEY }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Postman API Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Collection: 591b044d-f724-4439-8936-0c3efec537c4" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: 95dcc2d7-2489-4a4e-929d-2a6c7678c8c3" >> $GITHUB_STEP_SUMMARY