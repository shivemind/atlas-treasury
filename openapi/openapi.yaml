                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Reserve updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - reserve
                properties:
                  reserve:
                    type: object
        "400":
          description: Invalid request payload.
          content:
