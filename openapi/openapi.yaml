            - checking
            - savings
        is_verified:
          type: boolean
        is_primary:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UnderwritingCase:
      description: Underwriting review case linked to an onboarding profile.
      type: object
