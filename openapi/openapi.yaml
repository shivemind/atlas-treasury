      responses:
        "200":
          description: Reserve released.
          content:
            application/json:
              schema:
                type: object
                required:
                  - reserve
                properties:
                  reserve:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reserve not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Reserve is not in a releasable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/holds:
    get:
      summary: List holds
      description: Returns a paginated list of holds for the authenticated merchant.
