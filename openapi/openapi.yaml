  /api/internal/recon/sources:
    get:
      summary: List reconciliation sources
      description: Returns a paginated list of reconciliation sources.
      x-platform:
        kind: resource
        entity: ReconSource
        affectsLedger: false
      operationId: listReconSources
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of reconciliation sources.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401": &a1
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403": &a2
          description: Platform admin access required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create recon source
      description: Creates a new reconciliation source.
      x-platform:
        kind: resource
        entity: ReconSource
        affectsLedger: false
      operationId: createReconSource
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                type:
                  type: string
                config:
                  type: object
                metadata:
                  type: object
      responses:
        "201":
          description: Reconciliation source created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "400": &a3
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401": *a1
        "403": *a2
  /api/internal/recon/sources/{id}:
    get:
      summary: Get recon source
      description: Returns a single reconciliation source by ID.
      x-platform:
        kind: resource
        entity: ReconSource
        affectsLedger: false
      operationId: getReconSource
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Reconciliation source details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "401": *a1
        "404": &a4
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update recon source
      description: Updates a reconciliation source.
      x-platform:
        kind: resource
        entity: ReconSource
        affectsLedger: false
      operationId: updateReconSource
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                config:
                  type: object
                metadata:
                  type: object
      responses:
        "200":
          description: Reconciliation source updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "400": *a3
        "401": *a1
        "404": *a4
    delete:
      summary: Delete recon source
      description: Deletes a reconciliation source by ID.
      x-platform:
        kind: resource
        entity: ReconSource
        affectsLedger: false
      operationId: deleteReconSource
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Reconciliation source deleted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - id
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        "401": *a1
        "404": *a4
  /api/internal/recon/sources/{id}/imports:
    get:
      summary: List imports for source
      description: Returns a paginated list of imports for a reconciliation source.
      x-platform:
        kind: resource
        entity: ReconImport
        affectsLedger: false
      operationId: listReconImports
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of imports.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401": *a1
        "403": *a2
        "404": *a4
    post:
      summary: Create import
      description: Creates a new import for a reconciliation source.
      x-platform:
        kind: resource
        entity: ReconImport
        affectsLedger: false
      operationId: createReconImport
      tags:
        - Reconciliation
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_url
              properties:
                file_url:
                  type: string
                  format: uri
                format:
                  type: string
                metadata:
                  type: object
      responses:
        "201":
          description: Import created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "400": *a3
        "401": *a1
        "404": *a4
  /api/internal/recon/sources/{id}/imports/{importId}:
    get:
