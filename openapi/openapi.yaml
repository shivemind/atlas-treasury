        currency:
          type: string
        subtotal:
          type: integer
        tax:
          type: integer
        total:
          type: integer
        amount_paid:
          type: integer
        amount_due:
          type: integer
        due_date:
          type: string
          format: date-time
          nullable: true
        paid_at:
