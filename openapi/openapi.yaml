  /api/v1/reserves/{id}/release:
    post:
      summary: Release a reserve
      description: Releases a reserve, returning held funds to the available balance.
      x-platform:
        kind: transition
        entity: Reserve
        affectsLedger: true
        stateChanges:
          - active -> released
      operationId: releaseReserve
      tags:
