            - other
        status:
          type: string
          enum:
            - pending
            - verified
            - rejected
        file_name:
          type: string
        file_size:
          type: integer
          nullable: true
        mime_type:
          type: string
          nullable: true
        review_note:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingBankAccount:
      description: Bank account attached to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        bank_name:
          type: string
        account_holder_name:
          type: string
        routing_number:
          type: string
        account_number_last4:
          type: string
        account_type:
          type: string
