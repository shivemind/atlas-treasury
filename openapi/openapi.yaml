          type: string
        onboarding_profile_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          nullable: true
        ownership_percentage:
          type: integer
          nullable: true
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingDocument:
      description: Document record for KYB verification.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        type:
          type: string
