  /api/v1/holds/{id}/capture:
    post:
      summary: Capture a hold
      description: Captures a hold, converting the frozen funds into a completed transaction.
      x-platform:
        kind: transition
        entity: Hold
        affectsLedger: true
        stateChanges:
          - active -> captured
      operationId: captureHold
      tags:
        - Reserves
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Hold captured.
          content:
            application/json:
              schema:
                type: object
                required:
                  - hold
                properties:
                  hold:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Hold not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Hold is not in a capturable state.
          content:
