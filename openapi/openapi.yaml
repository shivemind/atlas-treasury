openapi: 3.1.0
info:
  title: Atlas Treasury API
  version: 0.2.0
  description: Transfers, reserves, holds, reconciliation, and settlement operations
  contact:
    name: AtlasPayments Team
    url: https://github.com/shivemind/atlaspayments
servers:
  - url: https://atlas-treasury.vercel.app
    description: Production server
  - url: http://localhost:3000
    description: Local development server. Override via Postman {{baseUrl}} environment variable.
tags:
  - name: Transfers
    description: Transfers between accounts
  - name: Reserves
    description: Reserve placement and hold management
  - name: Reconciliation
    description: Reconciliation imports, exports, period close, and diffs
paths:
  /api/v1/transfers:
    get:
      summary: List transfers
      description: Returns a paginated list of transfers for the authenticated merchant.
      x-platform:
        kind: report
        entity: Transfer
        affectsLedger: false
      operationId: listTransfers
      tags:
        - Transfers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of transfers.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a transfer
      description: Creates a new transfer between accounts for the authenticated merchant.
      x-platform:
        kind: transition
        entity: Transfer
        affectsLedger: true
        stateChanges:
          - created
      operationId: createTransfer
      tags:
        - Transfers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
              properties:
                amount:
                  type: integer
                  minimum: 1
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                description:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Transfer created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - transfer
                properties:
                  transfer:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/transfers/{id}:
    get:
      summary: Get transfer by ID
      description: Retrieves a single transfer by its ID.
      x-platform:
        kind: report
        entity: Transfer
        affectsLedger: false
      operationId: getTransferById
      tags:
        - Transfers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Transfer details.
          content:
            application/json:
              schema:
                type: object
                required:
                  - transfer
                properties:
                  transfer:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transfer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update transfer metadata
      description: Updates mutable fields on an existing transfer.
      x-platform:
        kind: transition
        entity: Transfer
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updateTransfer
      tags:
        - Transfers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Transfer updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - transfer
                properties:
                  transfer:
                    type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transfer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/transfers/{id}/reverse:
    post:
      summary: Reverse a transfer
      description: Reverses a completed transfer, returning funds to the source.
      x-platform:
        kind: transition
        entity: Transfer
        affectsLedger: true
        stateChanges:
          - completed -> reversed
      operationId: reverseTransfer
      tags:
        - Transfers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Transfer reversed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - transfer
                properties:
                  transfer:
                    type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transfer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transfer is not in a reversible state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
