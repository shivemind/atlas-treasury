apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-treasury
  namespace: atlas-production
  labels:
    app: atlas-treasury
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-treasury
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: atlas-treasury
    spec:
      containers:
        - name: atlas-treasury
          image: PLACEHOLDER_ECR_REGISTRY/atlas-treasury:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: atlas-treasury-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      terminationGracePeriodSeconds: 30
